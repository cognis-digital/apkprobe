name: ports

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o /dev/null .

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --verbose
      - run: cargo test --verbose

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: npm test

  kotlin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/kotlin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: install kotlin compiler
        run: |
          curl -sSL -o /tmp/kotlin.zip \
            https://github.com/JetBrains/kotlin/releases/download/v1.9.24/kotlin-compiler-1.9.24.zip
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> "$GITHUB_PATH"
      - name: compile
        run: kotlinc Rules.kt Main.kt Test.kt -include-runtime -d apkprobe-kt.jar
      - name: unit tests
        run: java -cp apkprobe-kt.jar TestKt
      - name: run on fixture (debuggable -> HIGH, exit 2)
        run: |
          set +e
          out=$(java -cp apkprobe-kt.jar MainKt manifest.fixture.json); code=$?
          echo "$out"; echo "exit=$code"
          echo "$out" | grep -q '"severity":"HIGH"' || { echo "expected HIGH"; exit 1; }
          [ "$code" = "2" ] || { echo "expected exit 2"; exit 1; }
