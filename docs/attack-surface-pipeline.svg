<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <title>apkprobe attack-surface and version-diff pipeline</title>
  <desc>Generated diagram (CC0, Cognis Digital). Shows how a binary APK flows through the AXML decoder into the manifest model, then fans out to the rule engine, attack-surface profiler, and version-diff regression detector.</desc>
  <style>
    .box{fill:#11161d;stroke:#3a4a5a;stroke-width:1.5;rx:8;}
    .accent{fill:#0d2230;stroke:#2e6f8e;}
    .new{fill:#13241a;stroke:#2f8f54;}
    .t{fill:#e8eef4;font-size:14px;}
    .s{fill:#9fb3c8;font-size:11px;}
    .h{fill:#cfe3f5;font-size:13px;font-weight:bold;}
    .arrow{stroke:#5b7a96;stroke-width:1.6;fill:none;marker-end:url(#a);}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#5b7a96"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="860" height="430" fill="#0a0e13"/>
  <text x="24" y="34" class="h" font-size="17">apkprobe — static analysis pipeline (zero deps, offline)</text>

  <!-- APK -->
  <rect class="box accent" x="24" y="64" width="150" height="64" rx="8"/>
  <text x="99" y="92" class="t" text-anchor="middle">app.apk</text>
  <text x="99" y="110" class="s" text-anchor="middle">ZIP container</text>

  <!-- axml -->
  <rect class="box" x="224" y="64" width="170" height="64" rx="8"/>
  <text x="309" y="88" class="t" text-anchor="middle">axml.py</text>
  <text x="309" y="106" class="s" text-anchor="middle">binary AXML decoder</text>
  <text x="309" y="120" class="s" text-anchor="middle">(no aapt / apktool)</text>

  <!-- manifest model -->
  <rect class="box" x="444" y="64" width="180" height="64" rx="8"/>
  <text x="534" y="88" class="t" text-anchor="middle">AppManifest</text>
  <text x="534" y="106" class="s" text-anchor="middle">pkg, sdk, perms,</text>
  <text x="534" y="120" class="s" text-anchor="middle">flags, components</text>

  <line class="arrow" x1="174" y1="96" x2="222" y2="96"/>
  <line class="arrow" x1="394" y1="96" x2="442" y2="96"/>

  <!-- three consumers -->
  <rect class="box" x="44" y="208" width="220" height="92" rx="8"/>
  <text x="154" y="232" class="t" text-anchor="middle">rules.py</text>
  <text x="154" y="252" class="s" text-anchor="middle">MASVS / MASTG checks</text>
  <text x="154" y="270" class="s" text-anchor="middle">-> Finding[] -> SARIF</text>
  <text x="154" y="288" class="s" text-anchor="middle">"which checks fail?"</text>

  <rect class="box new" x="300" y="208" width="240" height="92" rx="8"/>
  <text x="420" y="232" class="t" text-anchor="middle">attacksurface.py  (new)</text>
  <text x="420" y="252" class="s" text-anchor="middle">perm -> capability -> vector</text>
  <text x="420" y="270" class="s" text-anchor="middle">IPC surface + risk score 0-100</text>
  <text x="420" y="288" class="s" text-anchor="middle">"how exposed, and through what?"</text>

  <rect class="box new" x="576" y="208" width="240" height="92" rx="8"/>
  <text x="696" y="232" class="t" text-anchor="middle">diff.py  (new)</text>
  <text x="696" y="252" class="s" text-anchor="middle">old.apk vs new.apk</text>
  <text x="696" y="270" class="s" text-anchor="middle">regression / improvement</text>
  <text x="696" y="288" class="s" text-anchor="middle">"did the update get worse?"</text>

  <line class="arrow" x1="500" y1="128" x2="170" y2="206"/>
  <line class="arrow" x1="534" y1="128" x2="420" y2="206"/>
  <line class="arrow" x1="568" y1="128" x2="690" y2="206"/>

  <!-- outputs -->
  <rect class="box accent" x="300" y="344" width="240" height="56" rx="8"/>
  <text x="420" y="368" class="t" text-anchor="middle">table / JSON / SARIF</text>
  <text x="420" y="386" class="s" text-anchor="middle">CI gate via exit code</text>
  <line class="arrow" x1="154" y1="300" x2="340" y2="342"/>
  <line class="arrow" x1="420" y1="300" x2="420" y2="342"/>
  <line class="arrow" x1="696" y1="300" x2="500" y2="342"/>

  <text x="24" y="420" class="s">Diagram: Cognis Digital, released CC0. No third-party assets.</text>
</svg>
